# ============================================
# Docker Compose for Production
# FPT_TUD_EXT: Secure Update Implementation
# ============================================

services:
  # ============================================
  # Backend API Service (Production)
  # ============================================
  api:
    # در Production از Image از Registry استفاده می‌شود
    # image: ${DOCKER_REGISTRY}/bnpcash-api:${APP_VERSION}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_DATE=${BUILD_DATE}
        - BUILD_NUMBER=${BUILD_NUMBER}
    container_name: bnpcash-api-prod
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Server=db;Database=NavigationDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=true;Encrypt=true;Connection Timeout=60;
      - ConnectionStrings__LogConnection=Server=db;Database=BnpLogClaudeDB;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=true;Encrypt=true;Connection Timeout=60;
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER:-BnpCashClaudeApp}
      - Jwt__Audience=${JWT_AUDIENCE:-BnpCashClaudeAppClient}
      - Security__MasterKey=${MASTER_KEY}
      - Security__IntegrityKey=${INTEGRITY_KEY}
      - Security__UpdateSignature__PublicKey=${UPDATE_SIGNATURE_PUBLIC_KEY}
      - APP_VERSION=${APP_VERSION}
      - BUILD_DATE=${BUILD_DATE}
      - BUILD_NUMBER=${BUILD_NUMBER}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bnpcash-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # SQL Server Database (Production)
  # ============================================
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bnpcash-db-prod
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Standard
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data-prod:/var/opt/mssql
      - ./backup:/backup
    networks:
      - bnpcash-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${DB_PASSWORD} -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================
# Networks
# ============================================
networks:
  bnpcash-network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  sqlserver-data-prod:
    driver: local

